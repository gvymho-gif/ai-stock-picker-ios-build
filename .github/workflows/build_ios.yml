name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS (unsigned IPA)
    runs-on: macos-14
    timeout-minutes: 45
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Setup Flutter 3.0.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      # 修复 1：Flutter 3.0 的 podhelper.rb 用了已废弃的 File.exists?
      - name: 修复 1 - Flutter SDK Ruby 3.x 兼容
        run: |
          find $FLUTTER_ROOT/packages/flutter_tools/bin/ -name "podhelper*" -exec sed -i '' 's/File\.exists?/File.exist?/g' {} \;
          echo "✅ podhelper.rb 已修复"

      # 修复 2：直接注掉 CocoaPods target_validator.rb 的 Swift 校验方法
      - name: 修复 2 - 绕过 CocoaPods Swift 校验
        run: |
          VALIDATOR=$(find /opt/homebrew/lib/ruby/gems -name "target_validator.rb" -path "*/cocoapods/*" 2>/dev/null | head -1)
          if [ -n "$VALIDATOR" ] && [ -f "$VALIDATOR" ]; then
            cp "$VALIDATOR" "${VALIDATOR}.bak"
            sed -i '' 's/verify_swift_pods_swift_version/#verify_swift_pods_swift_version/' "$VALIDATOR"
            echo "✅ 已绕过: $VALIDATOR"
          else
            echo "⚠️ target_validator.rb 未找到"
          fi

      - name: Install dependencies
        working-directory: App源码/ai_stock_picker
        run: flutter pub get

      # 修复 3：在 pub cache 中找到 workmanager podspec 并注入 Swift 版本（双保险）
      - name: 修复 3 - 注入 workmanager Swift 版本
        working-directory: App源码/ai_stock_picker
        run: |
          # 从 .flutter-plugins 找到 workmanager 路径
          if [ -f ".flutter-plugins" ]; then
            WM=$(grep workmanager .flutter-plugins | cut -d= -f2)
            if [ -n "$WM" ]; then
              SPEC="$WM/ios/workmanager.podspec"
              if [ -f "$SPEC" ]; then
                if ! grep -q 'swift_version\|swift_versions' "$SPEC"; then
                  sed -i '' '/s\.source/a\'$'\n''  s.swift_versions = "5.0"' "$SPEC"
                  echo "✅ 已注入: $SPEC"
                else
                  echo "✅ Swift 版本已存在"
                fi
              fi
            fi
          fi
          # 兜底：也搜 pub cache
          find ~/.pub-cache -path "*/workmanager-*/ios/workmanager.podspec" -exec sh -c '
            if ! grep -q "swift_version\|swift_versions" "$1"; then
              sed -i "" "/s\.source/a\\\n  s.swift_versions = \"5.0\"" "$1"
              echo "✅ pub cache 注入: $1"
            fi
          ' _ {} \; 2>/dev/null || true
          echo "修复 3 完成"

      - name: Build iOS (unsigned)
        working-directory: App源码/ai_stock_picker
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        working-directory: App源码/ai_stock_picker
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "App: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -9qr 蓝图极智-v2.0.2-unsigned.ipa Payload/
          ls -lh 蓝图极智-v2.0.2-unsigned.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 蓝图极智-unsigned-iPA
          path: App源码/ai_stock_picker/蓝图极智-v2.0.2-unsigned.ipa
          retention-days: 7
