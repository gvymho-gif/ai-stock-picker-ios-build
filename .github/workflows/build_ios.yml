name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS (unsigned IPA)
    runs-on: macos-14
    timeout-minutes: 45
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Setup Flutter 3.0.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      # 清理本地生成的 Flutter 配置文件（包含硬编码路径）
      - name: 清理本地 Flutter 配置
        working-directory: App源码/ai_stock_picker
        run: |
          rm -f ios/Flutter/Generated.xcconfig
          rm -f ios/Flutter/flutter_export_environment.sh
          rm -f .flutter-plugins
          rm -f .flutter-plugins-dependencies
          rm -f ios/Podfile.lock
          rm -rf ios/Pods 2>/dev/null || true
          echo "✅ 已清理本地配置"

      # 修复 1：Flutter 3.0 的 podhelper.rb 用了已废弃的 File.exists?
      - name: 修复 1 - Flutter SDK Ruby 3.x 兼容
        run: |
          find $FLUTTER_ROOT/packages/flutter_tools/bin/ -name "podhelper*" -exec sed -i '' 's/File\.exists?/File.exist?/g' {} \;
          echo "✅ podhelper.rb 已修复"

      # 修复 2：绕过 CocoaPods 的 Swift 版本校验
      - name: 修复 2 - 绕过 CocoaPods Swift 校验
        run: |
          VALIDATOR=$(find /opt/homebrew/lib/ruby/gems -name "target_validator.rb" -path "*/cocoapods/*" 2>/dev/null | head -1)
          if [ -n "$VALIDATOR" ] && [ -f "$VALIDATOR" ]; then
            ruby -e "
              file = ARGV[0]
              lines = File.readlines(file)
              new_lines = []
              lines.each do |line|
                new_lines << line
                new_lines << \"  return\n\" if line =~ /^\s*def verify_swift_pods_swift_version\b/
              end
              File.write(file, new_lines.join)
            " "$VALIDATOR"
            echo "✅ Swift 校验已绕过"
          else
            echo "⚠️ target_validator.rb 未找到"
          fi

      - name: Install dependencies
        working-directory: App源码/ai_stock_picker
        run: flutter pub get

      - name: Pre-build Flutter framework
        working-directory: App源码/ai_stock_picker
        run: |
          # 先跑一次 flutter build ios --config-only 确保 Generated.xcconfig 等文件被正确生成
          # 然后 xcode_backend.sh 会把 Flutter framework 复制到正确位置
          flutter build ios --release --no-codesign --config-only || true
          # 检查 Generated.xcconfig 是否被重新生成
          cat ios/Flutter/Generated.xcconfig | head -5

      - name: Build iOS (unsigned)
        working-directory: App源码/ai_stock_picker
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        working-directory: App源码/ai_stock_picker
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "App: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -9qr 蓝图极智-v2.0.2-unsigned.ipa Payload/
          ls -lh 蓝图极智-v2.0.2-unsigned.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 蓝图极智-unsigned-iPA
          path: App源码/ai_stock_picker/蓝图极智-v2.0.2-unsigned.ipa
          retention-days: 7
