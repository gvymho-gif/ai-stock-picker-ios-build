name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS (unsigned IPA)
    runs-on: macos-14
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Setup Flutter 3.0.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      - name: 清理本地配置
        working-directory: App源码/ai_stock_picker
        run: |
          rm -f ios/Flutter/Generated.xcconfig ios/Flutter/flutter_export_environment.sh
          rm -f .flutter-plugins .flutter-plugins-dependencies ios/Podfile.lock
          rm -rf ios/Pods 2>/dev/null || true

      # 修复 1：podhelper.rb File.exists? → File.exist?
      - name: 修复 1 - Ruby 3.x 兼容
        run: find $FLUTTER_ROOT/packages/flutter_tools/bin/ -name "podhelper*" -exec sed -i '' 's/File\.exists?/File.exist?/g' {} \;

      # 修复 2：绕过 CocoaPods Swift 校验
      - name: 修复 2 - 绕过 CocoaPods Swift 校验
        run: |
          VALIDATOR=$(find /opt/homebrew/lib/ruby/gems -name "target_validator.rb" -path "*/cocoapods/*" 2>/dev/null | head -1)
          if [ -n "$VALIDATOR" ]; then
            ruby -e "
              file = ARGV[0]; lines = File.readlines(file); new_lines = []
              lines.each { |l| new_lines << l; new_lines << \"  return\n\" if l =~ /^\s*def verify_swift_pods_swift_version\b/ }
              File.write(file, new_lines.join)
            " "$VALIDATOR"
          fi

      # 核心修复 3：将 iOS device 版的 Flutter xcframework 复制到 ios/Flutter/ 下，
      # 让 CocoaPods 的 Pods targets 能通过 FRAMEWORK_SEARCH_PATHS 找到 Flutter/Flutter.h
      - name: 核心修复 3 - 安装 Flutter xcframework 到 ios/Flutter
        working-directory: App源码/ai_stock_picker
        run: |
          # 找到真机版 Flutter xcframework
          XCFW="$FLUTTER_ROOT/bin/cache/artifacts/engine/ios-release/Flutter.xcframework"
          DEVICE_FW="$XCFW/ios-arm64_armv7/Flutter.framework"
          
          if [ -d "$DEVICE_FW" ]; then
            echo "✅ 找到真机 Flutter.framework: $DEVICE_FW"
            
            # 创建 ios/Flutter/Flutter.framework symlink
            mkdir -p ios/Flutter
            # 直接把 xcframework 复制过来（用 symlink 不够可靠）
            cp -R "$DEVICE_FW" ios/Flutter/Flutter.framework
            
            # 验证 Flutter.h 存在
            ls ios/Flutter/Flutter.framework/Headers/Flutter.h && echo "✅ Flutter.h 已就位"
          else
            echo "❌ Flutter.framework 未找到"
            find "$FLUTTER_ROOT/bin/cache/artifacts/engine/ios-release" -name "*.framework" -type d | head -5
            exit 1
          fi

      - name: flutter pub get
        working-directory: App源码/ai_stock_picker
        run: flutter pub get

      # pod install 后修改 Pods project，为所有 targets 添加 FRAMEWORK_SEARCH_PATHS
      - name: pod install + 注入 FRAMEWORK_SEARCH_PATHS
        working-directory: App源码/ai_stock_picker/ios
        run: |
          pod install
          
          # 用 Ruby xcodeproj gem 修改 Pods project
          ruby -e "
            require 'xcodeproj'
            project = Xcodeproj::Project.open('Pods/Pods.xcodeproj')
            project.targets.each do |target|
              target.build_configurations.each do |config|
                paths = config.build_settings['FRAMEWORK_SEARCH_PATHS'] || ['$(inherited)']
                if paths.is_a?(String)
                  paths = paths.split
                end
                paths << '\"ios/Flutter\"'
                config.build_settings['FRAMEWORK_SEARCH_PATHS'] = paths
              end
            end
            project.save
            puts '✅ FRAMEWORK_SEARCH_PATHS 已注入到所有 Pods targets'
          "

      - name: flutter build ios
        working-directory: App源码/ai_stock_picker
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        working-directory: App源码/ai_stock_picker
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "App: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -9qr 蓝图极智-v2.0.2-unsigned.ipa Payload/
          ls -lh 蓝图极智-v2.0.2-unsigned.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 蓝图极智-unsigned-iPA
          path: App源码/ai_stock_picker/蓝图极智-v2.0.2-unsigned.ipa
          retention-days: 7
