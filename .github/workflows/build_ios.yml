name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 45
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter 3.0.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install dependencies
        working-directory: App源码/ai_stock_picker
        run: flutter pub get

      - name: Build iOS (no codesign)
        working-directory: App源码/ai_stock_picker
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        working-directory: App源码/ai_stock_picker
        run: |
          RUNNER_APP=$(find build/ios -name "Runner.app" -type d | head -1)
          if [ -z "$RUNNER_APP" ]; then
            echo "Build failed - Runner.app not found"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$RUNNER_APP" Payload/
          zip -qr 蓝图极智-v2.0.2.ipa Payload/
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: 蓝图极智-iOS-IPA
          path: App源码/ai_stock_picker/蓝图极智-v2.0.2.ipa
          retention-days: 7
