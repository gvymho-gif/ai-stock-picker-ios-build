name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS (unsigned IPA)
    runs-on: macos-14
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Setup Flutter 3.0.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      - name: 清理本地配置
        working-directory: App源码/ai_stock_picker
        run: |
          rm -f ios/Flutter/Generated.xcconfig ios/Flutter/flutter_export_environment.sh
          rm -f .flutter-plugins .flutter-plugins-dependencies ios/Podfile.lock
          rm -rf ios/Pods 2>/dev/null || true

      # 修复 1：podhelper.rb File.exists? → File.exist?
      - name: 修复 1 - Ruby 3.x 兼容
        run: find $FLUTTER_ROOT/packages/flutter_tools/bin/ -name "podhelper*" -exec sed -i '' 's/File\.exists?/File.exist?/g' {} \;

      # 修复 2：绕过 CocoaPods Swift 校验
      - name: 修复 2 - 绕过 CocoaPods Swift 校验
        run: |
          VALIDATOR=$(find /opt/homebrew/lib/ruby/gems -name "target_validator.rb" -path "*/cocoapods/*" 2>/dev/null | head -1)
          if [ -n "$VALIDATOR" ]; then
            ruby -e "
              file = ARGV[0]; lines = File.readlines(file); new_lines = []
              lines.each { |l| new_lines << l; new_lines << \"  return\n\" if l =~ /^\s*def verify_swift_pods_swift_version\b/ }
              File.write(file, new_lines.join)
            " "$VALIDATOR"
          fi

      # 核心修复：把 iOS device (arm64) 版本的 Flutter xcframework 头文件复制到 ios/Flutter/
      # 这样 Pods targets 就能找到 Flutter/Flutter.h
      - name: 核心修复 - 安装 Flutter 头文件到 ios/Flutter
        run: |
          echo "FLUTTER_ROOT=$FLUTTER_ROOT"
          # 找到 iOS release engine artifacts
          ENGINE_DIR="$FLUTTER_ROOT/bin/cache/artifacts/engine"
          echo "=== Engine artifacts ==="
          ls "$ENGINE_DIR" | head -10
          
          # 找到 xcframework 中的真机 Flutter.framework
          FW_PATH=$(find "$ENGINE_DIR/ios-release" -name "Flutter.framework" -not -path "*simulator*" -type d | head -1)
          echo "Flutter.framework: $FW_PATH"
          
          if [ -n "$FW_PATH" ] && [ -d "$FW_PATH" ]; then
            # 把 Flutter.framework 的 Headers 目录复制到 ios/Flutter/ 下
            # 让 Pods targets 能通过 #import <Flutter/Flutter.h> 找到
            HEADERS_SRC="$FW_PATH/Headers"
            echo "Headers: $HEADERS_SRC"
            ls "$HEADERS_SRC" | head -5
          else
            # 如果 xcframework 结构不同，尝试查找 arm64 子目录
            XCFW=$(find "$ENGINE_DIR" -name "Flutter.xcframework" -type d | head -1)
            echo "xcframework: $XCFW"
            ls "$XCFW" 2>/dev/null | head -10
            FW_PATH=$(find "$XCFW" -name "Flutter.framework" -not -path "*simulator*" -type d | head -1)
            echo "arm64 Flutter.framework: $FW_PATH"
          fi

      - name: flutter pub get
        working-directory: App源码/ai_stock_picker
        run: flutter pub get

      - name: flutter build ios
        working-directory: App源码/ai_stock_picker
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        working-directory: App源码/ai_stock_picker
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "App: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -9qr 蓝图极智-v2.0.2-unsigned.ipa Payload/
          ls -lh 蓝图极智-v2.0.2-unsigned.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 蓝图极智-unsigned-iPA
          path: App源码/ai_stock_picker/蓝图极智-v2.0.2-unsigned.ipa
          retention-days: 7
